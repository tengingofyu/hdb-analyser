name: Deploy with keys

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API keys
        run: |
          sed -i "s|const API_KEY='';|const API_KEY='${{ secrets.DATAGOV_API_KEY }}';|" index.html
          sed -i "s|const ONEMAP_TOKEN='';|const ONEMAP_TOKEN='${{ secrets.ONEMAP_TOKEN }}';|" index.html
          grep "API_KEY" index.html | head -2

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
